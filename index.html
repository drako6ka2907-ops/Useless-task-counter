!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klarna Useless Tasks Counter</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 30px;
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }
        button:hover {
            background: #764ba2;
            transform: scale(1.05);
        }
        button:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Counter of useless Klarna tasks: <span id="counter">0</span></h1>
        <button id="incrementBtn">Click me</button>
    </div>

    <script>
        const JSONBIN_ID = 'YOUR_BIN_ID';
        const JSONBIN_KEY = 'YOUR_MASTER_KEY';
        
        const API_URL = `https://api.jsonbin.io/v3/bin/${JSONBIN_ID}`;

        // Load counter
        async function loadCounter() {
            try {
                const res = await fetch(API_URL);
                console.log('Load response status:', res.status);
                const data = await res.json();
                console.log('Load data:', data);
                document.getElementById('counter').textContent = data.count || 0;
            } catch (error) {
                console.error('Failed to load counter:', error);
            }
        }

        // Increment
        async function increment() {
            try {
                // First, get current count
                const res = await fetch(API_URL);
                const data = await res.json();
                const currentCount = data.count || 0;
                const newCount = currentCount + 1;
                
                console.log('Incrementing from', currentCount, 'to', newCount);
                
                // Update the bin
                const updateRes = await fetch(API_URL, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key': JSONBIN_KEY
                    },
                    body: JSON.stringify({ count: newCount })
                });
                
                console.log('Update response status:', updateRes.status);
                
                if (!updateRes.ok) {
                    const errorText = await updateRes.text();
                    console.error('Update failed:', errorText);
                    throw new Error(`Update failed: ${updateRes.status}`);
                }
                
                // Update display
                document.getElementById('counter').textContent = newCount;
                console.log('Success! New count:', newCount);
            } catch (error) {
                console.error('Failed to increment:', error);
                alert('Error: ' + error.message);
            }
        }

        document.getElementById('incrementBtn').onclick = increment;
        loadCounter();
    </script>
</body>
</html>
